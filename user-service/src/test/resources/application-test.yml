spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:user_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: false
