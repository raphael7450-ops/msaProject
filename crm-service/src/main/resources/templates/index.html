<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changwon CRM</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --sidebar: #1e293b;
            --sidebar-hover: #334155;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --text: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #6366f1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            color: #fff;
            padding: 24px 16px;
            flex-shrink: 0;
        }

        .brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .brand-sub { font-size: 0.8rem; color: #94a3b8; margin-bottom: 32px; }

        .nav-item {
            display: block;
            padding: 12px 14px;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .main { flex: 1; padding: 32px; overflow-x: auto; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 1.75rem; margin-bottom: 6px; }
        .header p { color: var(--muted); }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }

        .stat-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card:nth-child(1) .stat-value { color: var(--primary); }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-header h2 { font-size: 1.1rem; }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover { background: var(--primary-dark); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-outline:hover { background: #eff6ff; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-dark); }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            font-weight: 600;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        .actions { display: flex; gap: 8px; align-items: center; }
        .actions form { display: inline; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #dbeafe;
            color: #1e40af;
        }

        .empty-row td {
            text-align: center;
            color: var(--muted);
            padding: 32px;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; padding: 16px; }
            .main { padding: 20px; }
            .actions { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Changwon CRM</div>
        <div class="brand-sub">MSA 기반 고객 관리</div>
        <nav>
            <a class="nav-item active" th:href="${basePath + '/'}">대시보드</a>
            <a class="nav-item" th:href="${basePath + '/customers/new'}">고객 등록</a>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <h1>CRM 대시보드</h1>
            <p>고객 등록 · 수정 · 삭제 (user-service 연동)</p>
        </header>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">전체 고객</div>
                <div class="stat-value" th:text="${stats.totalCustomers}">0</div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>고객 목록</h2>
                <a class="btn" th:href="${basePath + '/customers/new'}">+ 고객 추가</a>
            </div>
            <table>
                <thead>
                <tr>
                    <th>이름</th>
                    <th>사용자 ID</th>
                    <th>이메일</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(customers)}" class="empty-row">
                    <td colspan="5">등록된 고객이 없습니다. [고객 추가]로 등록해 주세요.</td>
                </tr>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.name}">이름</td>
                    <td th:text="${customer.company}">사용자 ID</td>
                    <td th:text="${customer.email}">email</td>
                    <td><span class="badge" th:text="${customer.status}">등록</span></td>
                    <td>
                        <div class="actions">
                            <a class="btn btn-sm btn-outline"
                               th:href="${basePath + '/customers/' + customer.id + '/edit'}">수정</a>
                            <form th:action="${basePath + '/customers/' + customer.id + '/delete'}"
                                  method="post"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button class="btn btn-sm btn-danger" type="submit">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <p class="footer-note">
            crm-service · Gateway: /crm-service/
        </p>
    </main>
</div>
</body>
</html>
