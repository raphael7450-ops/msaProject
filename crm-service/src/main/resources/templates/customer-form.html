<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? '고객 수정 - Changwon CRM' : '고객 등록 - Changwon CRM'">고객 등록</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --sidebar: #1e293b;
            --sidebar-hover: #334155;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --text: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            color: #fff;
            padding: 24px 16px;
        }

        .brand { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .brand-sub { font-size: 0.8rem; color: #94a3b8; margin-bottom: 32px; }

        .nav-item {
            display: block;
            padding: 12px 14px;
            border-radius: 8px;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .main { flex: 1; padding: 32px; }

        .panel {
            max-width: 560px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }

        .panel h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        .alert-error {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 0.9rem;
        }

        .field { margin-bottom: 20px; }

        .field label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 28px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-secondary:hover { background: #cbd5e1; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Changwon CRM</div>
        <div class="brand-sub">MSA 기반 고객 관리</div>
        <nav>
            <a class="nav-item" th:href="${basePath + '/'}">대시보드</a>
            <a class="nav-item active" th:href="${basePath + '/customers/new'}">고객 등록</a>
        </nav>
    </aside>

    <main class="main">
        <section class="panel">
            <h1 th:text="${isEdit} ? '고객 수정' : '고객 등록'">고객 등록</h1>

            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <form th:action="${isEdit ? basePath + '/customers/' + customer.id : basePath + '/customers'}"
                  method="post"
                  th:object="${customer}">

                <div class="field">
                    <label for="userId">사용자 ID</label>
                    <input id="userId" type="text" th:field="*{userId}" placeholder="예: kim_minsu" required>
                </div>

                <div class="field">
                    <label for="name">이름</label>
                    <input id="name" type="text" th:field="*{name}" placeholder="예: 김민수" required>
                </div>

                <div class="field">
                    <label for="email">이메일</label>
                    <input id="email" type="email" th:field="*{email}" placeholder="예: minsu@example.com" required>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" type="submit"
                            th:text="${isEdit} ? '수정 저장' : '등록'">등록</button>
                    <a class="btn btn-secondary" th:href="${basePath + '/'}">취소</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
