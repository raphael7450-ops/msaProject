# login-service 공통 설정 (local / prod 공통)
token:
  secret: ${JWT_SECRET}
  expiration_time: 86400000

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
