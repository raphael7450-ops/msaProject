# gateway-service 공통 설정
server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

---
# PC 로컬 개발 (local)
spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      routes:
        - id: login-service-route
          uri: http://localhost:8088
          predicates:
            - Path=/login-service/**
          filters:
            - StripPrefix=1
        - id: user-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/user-service/**
          filters:
            - AuthorizationHeaderFilter
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}
        - id: crm-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/crm-service/**
          filters:
            - AuthorizationHeaderFilter
            - RewritePath=/crm-service/(?<segment>.*), /$\{segment}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

---
# 도커 서버 배포 (prod) — 기존 포트 유지
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: login-service-route
          uri: lb://LOGIN-SERVICE
          predicates:
            - Path=/login-service/**
          filters:
            - StripPrefix=1
        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/**
          filters:
            - AuthorizationHeaderFilter
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}
        - id: crm-service-route
          uri: lb://CRM-SERVICE
          predicates:
            - Path=/crm-service/**
          filters:
            - AuthorizationHeaderFilter
            - RewritePath=/crm-service/(?<segment>.*), /$\{segment}
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
